<!doctype html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#16130F;--red:#D6262C;--green:#1E7A4E;--gold:#C4892B;--brown:#7a6a4c}
html,body{width:1080px;height:1350px}
body{font-family:'Arial','Helvetica Neue',sans-serif;color:var(--ink);width:1080px;height:1350px;position:relative;overflow:hidden;
background:radial-gradient(900px 520px at 88% -6%,rgba(196,137,43,.16),transparent 60%),radial-gradient(760px 460px at -8% 106%,rgba(214,38,44,.08),transparent 60%),#F7F2E9}
.frame{position:absolute;inset:26px;border:2px solid rgba(22,19,15,.14);border-radius:22px}
.pad{position:absolute;inset:0;padding:58px 74px 92px;display:flex;flex-direction:column}
.kicker{display:flex;align-items:center;gap:14px;font-weight:800;letter-spacing:.20em;font-size:22px;color:#7a6a4c}
.kicker .dot{width:12px;height:12px;border-radius:50%;background:var(--red)}
.head{display:flex;align-items:center;gap:26px;margin-top:24px}
.badge{width:112px;height:112px;border-radius:50%;border:5px solid var(--ink);display:flex;align-items:center;justify-content:center;gap:9px;flex:none;background:#fff}
.badge .c{width:19px;border-radius:3px} .badge .cr{height:54px;background:var(--red)} .badge .cg{height:42px;background:var(--green)}
h1{font-weight:900;line-height:.92;letter-spacing:-.5px}
h1 .l1{display:block;font-size:50px;color:var(--gold)}
h1 .l2{display:block;font-size:74px;text-transform:uppercase}
.stage{flex:1;display:flex;align-items:center;justify-content:center;margin-top:0;min-height:0}
.foot{display:flex;align-items:flex-end;justify-content:space-between}
.logo .r{font-weight:900;font-size:52px;letter-spacing:2px} .logo .r b{color:var(--red)}
.logo .s{font-weight:800;letter-spacing:.42em;font-size:18px;color:#7a6a4c;margin-top:2px}
.site{text-align:right;font-weight:700;font-size:22px;color:#7a6a4c} .site b{display:block;color:var(--ink);font-size:24px}
text{font-family:'Arial','Helvetica Neue',sans-serif}
</style></head><body>
<div class="frame"></div>
<div class="pad">
  <div class="kicker"><span class="dot"></span> REX TRADING SIGNAL &middot; RISK MANAGEMENT</div>
  <div class="head"><div class="badge"><span class="c cr"></span><span class="c cg"></span></div>
    <h1><span class="l1">One division, not a headache</span><span class="l2">Position Sizing</span></h1></div>
  <div class="stage"><svg width="880" height="665" viewBox="0 0 900 680"><defs><marker id="ar" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#7a6a4c"/></marker><marker id="arG" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#1E7A4E"/></marker><marker id="arR" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#D6262C"/></marker></defs><rect x="150" y="120" width="600" height="120" rx="14" fill="#fff" stroke="rgba(22,19,15,.18)" stroke-width="3"/><text x="450" y="178" text-anchor="middle" font-size="30" font-weight="900" fill="#16130F">LOT SIZE</text><text x="450" y="222" text-anchor="middle" font-size="24" font-weight="800" fill="#7a6a4c">= Risk ($)  &#247;  Stop distance</text><line x1="280" y1="330" x2="280" y2="560" stroke="#1E7A4E" stroke-width="6"/><rect x="245" y="410" width="70" height="60" rx="7" fill="#1E7A4E"/><line x1="180" y1="470" x2="380" y2="470" stroke="#D6262C" stroke-width="3" stroke-dasharray="10 7"/><text x="280" y="610" text-anchor="middle" font-size="22" font-weight="800" fill="#16130F">TIGHT stop</text><text x="280" y="640" text-anchor="middle" font-size="19" font-weight="800" fill="#1E7A4E">&#8594; bigger size</text><line x1="650" y1="300" x2="650" y2="600" stroke="#D6262C" stroke-width="6"/><rect x="615" y="410" width="70" height="130" rx="7" fill="#D6262C"/><line x1="550" y1="540" x2="750" y2="540" stroke="#D6262C" stroke-width="3" stroke-dasharray="10 7"/><text x="650" y="610" text-anchor="middle" font-size="22" font-weight="800" fill="#16130F">WIDE stop</text><text x="650" y="640" text-anchor="middle" font-size="19" font-weight="800" fill="#D6262C">&#8594; smaller size</text><text x="450" y="420" text-anchor="middle" font-size="20" font-weight="800" fill="#a99a7c">same $</text><text x="450" y="446" text-anchor="middle" font-size="20" font-weight="800" fill="#a99a7c">risk</text></svg></div>
  <div class="foot">
    <div class="logo"><div class="r">RE<b>X</b></div><div class="s">TRADING SIGNAL</div></div>
    <div class="site">Every signal has a stop loss.&nbsp;<b>rextradingsignal.com</b></div>
  </div>
</div></body></html>

<!doctype html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#16130F;--red:#D6262C;--green:#1E7A4E;--gold:#C4892B;--brown:#7a6a4c}
html,body{width:1080px;height:1350px}
body{font-family:'Arial','Helvetica Neue',sans-serif;color:var(--ink);width:1080px;height:1350px;position:relative;overflow:hidden;
background:radial-gradient(900px 520px at 88% -6%,rgba(196,137,43,.16),transparent 60%),radial-gradient(760px 460px at -8% 106%,rgba(214,38,44,.08),transparent 60%),#F7F2E9}
.frame{position:absolute;inset:26px;border:2px solid rgba(22,19,15,.14);border-radius:22px}
.pad{position:absolute;inset:0;padding:58px 74px 92px;display:flex;flex-direction:column}
.kicker{display:flex;align-items:center;gap:14px;font-weight:800;letter-spacing:.20em;font-size:22px;color:#7a6a4c}
.kicker .dot{width:12px;height:12px;border-radius:50%;background:var(--red)}
.head{display:flex;align-items:center;gap:26px;margin-top:24px}
.badge{width:112px;height:112px;border-radius:50%;border:5px solid var(--ink);display:flex;align-items:center;justify-content:center;gap:9px;flex:none;background:#fff}
.badge .c{width:19px;border-radius:3px} .badge .cr{height:54px;background:var(--red)} .badge .cg{height:42px;background:var(--green)}
h1{font-weight:900;line-height:.92;letter-spacing:-.5px}
h1 .l1{display:block;font-size:50px;color:var(--gold)}
h1 .l2{display:block;font-size:74px;text-transform:uppercase}
.stage{flex:1;display:flex;align-items:center;justify-content:center;margin-top:0;min-height:0}
.foot{display:flex;align-items:flex-end;justify-content:space-between}
.logo .r{font-weight:900;font-size:52px;letter-spacing:2px} .logo .r b{color:var(--red)}
.logo .s{font-weight:800;letter-spacing:.42em;font-size:18px;color:#7a6a4c;margin-top:2px}
.site{text-align:right;font-weight:700;font-size:22px;color:#7a6a4c} .site b{display:block;color:var(--ink);font-size:24px}
text{font-family:'Arial','Helvetica Neue',sans-serif}
</style></head><body>

  </div>
</div></body></html>

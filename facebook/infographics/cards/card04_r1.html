<!doctype html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1080px}
body{font-family:'Arial','Helvetica Neue',sans-serif;color:#16130F;width:1080px;height:1080px;position:relative;overflow:hidden;
background:radial-gradient(900px 520px at 88% -6%,rgba(196,137,43,.18),transparent 60%),radial-gradient(760px 460px at -8% 106%,rgba(214,38,44,.10),transparent 60%),#F7F2E9}
.frame{position:absolute;inset:24px;border:2px solid rgba(22,19,15,.14);border-radius:22px}
.pad{position:absolute;inset:0;padding:60px 80px 92px;display:flex;flex-direction:column}
.kicker{display:flex;align-items:center;gap:13px;font-weight:800;letter-spacing:.18em;font-size:22px;color:#7a6a4c}
.kicker .dot{width:12px;height:12px;border-radius:50%;background:#D6262C}
.mid{flex:1;display:flex;flex-direction:column;justify-content:center}
.quote{font-size:150px;line-height:.6;color:#C4892B;font-weight:900;height:64px}
h1{font-weight:900;line-height:1.04;letter-spacing:-1px;font-size:82px}
h1 .g{color:#C4892B} h1 .r{color:#D6262C}
.body{margin-top:28px;font-size:31px;line-height:1.45;color:#3d372e;font-weight:500;max-width:850px}
.stat{font-weight:900;font-size:210px;line-height:.9;color:#D6262C;letter-spacing:-4px}
.label{font-size:39px;font-weight:800;margin-top:6px}
.foot{display:flex;align-items:flex-end;justify-content:space-between}
.logo .r{font-weight:900;font-size:50px;letter-spacing:2px} .logo .r b{color:#D6262C}
.logo .s{font-weight:800;letter-spacing:.40em;font-size:17px;color:#7a6a4c;margin-top:2px}
.site{text-align:right;font-weight:700;font-size:21px;color:#7a6a4c} .site b{display:block;color:#16130F;font-size:23px}
</style></head><body><div class="frame"></div><div class="pad">
<div class="kicker"><span class="dot"></span> REX TRADING SIGNAL · HOUSE RULE</div>
<div class="mid"><div class="quote">&ldquo;</div><h1>Every signal has a <span class="r">stop loss</span>.</h1><div class="body">Before we ever talk about profit. Capital is oxygen — no oxygen, no next trade.</div></div>
<div class="foot"><div class="logo"><div class="r">RE<b>X</b></div><div class="s">TRADING SIGNAL</div></div>
<div class="site">Every signal has a stop loss.<b>rextradingsignal.com</b></div></div>
</div></body></html>
